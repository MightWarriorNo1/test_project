# NTL Detection Engine - Docker Compose
# Services: Kafka, Zookeeper, Redis, TimescaleDB (optional), FastAPI, Ingestion worker, Celery worker

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  timescaledb:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: ntl
      POSTGRES_PASSWORD: ntl
      POSTGRES_DB: ntl
    ports:
      - "5432:5432"
    volumes:
      - tsdb_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn ntl_engine.api.app:create_app --factory --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    environment:
      NTL_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      NTL_REDIS_URL: redis://redis:6379/0
      NTL_TIMESCALEDB_DSN: postgresql://ntl:ntl@timescaledb:5432/ntl
    depends_on:
      - kafka
      - redis

  ingestion-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: python -m ntl_engine.ingestion.consumer_run
    environment:
      NTL_KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      NTL_KAFKA_TELEMETRY_TOPIC: telemetry.raw
      NTL_KAFKA_GROUP_ID: ntl-ingestion
    depends_on:
      - kafka

  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    command: celery -A ntl_engine.workers.tasks worker --loglevel=info
    environment:
      NTL_REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - api

volumes:
  tsdb_data: {}
